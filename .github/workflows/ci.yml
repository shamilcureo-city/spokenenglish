name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # core must be built before the web app typechecks against its dist
      - run: npm run build -w @fluentmap/core
      - run: npm run typecheck
      - run: npm test
